{% extends "auth/base_auth.html" %}
{% block title %}Recuperar Contraseña — BTU UASLP{% endblock %}

{% block content %}
<div class="auth-card" style="max-width:440px;">
    <h2><i class="fas fa-unlock-alt" style="color:var(--uaslp-cyan);margin-right:10px;"></i>Recuperar Contraseña</h2>
    <p class="subtitle">Ingresa tu correo institucional y te enviaremos un enlace para restablecer tu contraseña.</p>

    <form method="POST" action="{{ url_for('auth.recuperar_password') }}">
        <div class="form-group">
            <label for="email"><i class="fas fa-envelope"></i> Correo Electrónico</label>
            <input type="email" id="email" name="email" placeholder="usuario@uaslp.mx" required autocomplete="email">
        </div>

        <button type="submit" class="btn-submit">
            <i class="fas fa-paper-plane"></i> Enviar enlace de recuperación
        </button>
    </form>

    <div class="auth-links">
        <a href="{{ url_for('auth.login') }}"><i class="fas fa-arrow-left"></i> Volver al inicio de sesión</a>
    </div>
</div>
{% endblock %}
