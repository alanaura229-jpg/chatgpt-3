{% extends "auth/base_auth.html" %}
{% block title %}Iniciar Sesión — BTU UASLP{% endblock %}

{% block content %}
<div class="auth-card" style="max-width:460px;">
    <h2><i class="fas fa-sign-in-alt" style="color:var(--uaslp-cyan);margin-right:10px;"></i>Iniciar Sesión</h2>
    <p class="subtitle">Accede a la Bolsa de Trabajo Universitaria con tu cuenta institucional.</p>

    <form method="POST" action="{{ url_for('auth.login') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() if csrf_token is defined else '' }}">

        <div class="form-group">
            <label for="email"><i class="fas fa-envelope"></i> Correo electrónico</label>
            <input type="email" id="email" name="email" placeholder="usuario@uaslp.mx" required autocomplete="email">
        </div>

        <div class="form-group">
            <label for="password"><i class="fas fa-lock"></i> Contraseña</label>
            <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
        </div>

        <button type="submit" class="btn-submit">
            <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
        </button>
    </form>

    <div class="auth-links">
        <a href="{{ url_for('auth.recuperar_password') }}"><i class="fas fa-key"></i> ¿Olvidaste tu contraseña?</a>
        &nbsp;|&nbsp;
        <a href="{{ url_for('auth.registro_selector') }}"><i class="fas fa-user-plus"></i> Crear cuenta</a>
    </div>

    <div class="auth-links" style="margin-top:10px;">
        <a href="{{ url_for('main.index') }}"><i class="fas fa-home"></i> Volver al inicio</a>
    </div>
</div>
{% endblock %}
