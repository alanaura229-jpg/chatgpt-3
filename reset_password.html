{% extends "auth/base_auth.html" %}
{% block title %}Nueva Contraseña — BTU UASLP{% endblock %}

{% block content %}
<div class="auth-card" style="max-width:440px;">
    <h2><i class="fas fa-lock" style="color:var(--uaslp-cyan);margin-right:10px;"></i>Nueva Contraseña</h2>
    <p class="subtitle">Elige una contraseña segura de al menos 8 caracteres.</p>

    <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}">
        <div class="form-group">
            <label for="password"><i class="fas fa-lock"></i> Nueva contraseña *</label>
            <input type="password" id="password" name="password" required minlength="8" placeholder="••••••••">
        </div>
        <div class="form-group">
            <label for="confirm_password"><i class="fas fa-lock"></i> Confirmar contraseña *</label>
            <input type="password" id="confirm_password" name="confirm_password" required minlength="8" placeholder="••••••••">
        </div>

        <button type="submit" class="btn-submit">
            <i class="fas fa-save"></i> Guardar nueva contraseña
        </button>
    </form>
</div>
{% endblock %}
